version: "3"

vars:
  BINARY: lazydev
  GOFLAGS: -ldflags="-s -w"
  PRETTIER_VERSION: 3.6.2

tasks:
  init:
    desc: Install dev dependencies
    cmds:
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go mod tidy

  build:
    desc: Build binary
    cmds:
      - go build {{.GOFLAGS}} -o {{.BINARY}} ./cmd/lazydev/

  run:
    desc: Build and run
    deps: [build]
    cmds:
      - ./{{.BINARY}}

  clean:
    desc: Remove binary
    cmds:
      - rm -f {{.BINARY}}

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go and Markdown files
    cmds:
      - gofmt -s -w .
      - goimports -w .
      - npx prettier --write "**/*.md" 2>/dev/null || true

  format-check:
    desc: Check file formatting
    cmds:
      - |
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --check "**/*.md"
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --check "**/*.yaml"
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --check "**/*.yml"

  format:
    desc: Format files with Docker prettier
    cmds:
      - |
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --write "**/*.md"
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --write "**/*.yaml"
        docker run --rm -u "$(id -u):$(id -g)" -v $(pwd):/work tmknom/prettier:{{.PRETTIER_VERSION}} --write "**/*.yml"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  check:
    desc: Format, lint, and build
    cmds:
      - task: fmt
      - task: lint
      - task: build

  pre-push-checks:
    desc: Run pre-push checks
    cmds:
      - task: format-check
      - task: lint
      - task: build
